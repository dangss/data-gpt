api-version: 2019-12-01
location: eastus
name: digpt
properties:
  containers:
  - name: digptstreamlitapp
    properties:
      image: crdigpt.azurecr.io/digpt:v1
      ports:
      - port: 80
        protocol: TCP
      - port: 443
        protocol: TCP
      resources:
        requests:
          cpu: 4.0
          memoryInGB: 64.0
  restartPolicy: Never
  ipAddress:
    ports:
    - port: 443
      protocol: TCP
    - port: 80
      protocol: TCP
    type: Public
    dnsNameLabel: digpt
  osType: Linux
tags: null
type: Microsoft.ContainerInstance/containerGroups
